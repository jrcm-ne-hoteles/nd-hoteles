<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ND Hoteles · Esperando atención</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: radial-gradient(circle at top, #191919 0%, #080808 55%, #000000 100%);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .logo-overlay {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      opacity: 0.92;
    }

    .logo-overlay img {
      width: 158px;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
    }

    .center-logo {
      position: fixed;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9998;
    }

    .center-logo img {
      width: 126px;
      height: 126px;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 0 24px rgba(255,255,255,0.12);
      animation: pulseLogo 2.8s ease-in-out infinite;
    }

    .waiting {
      position: fixed;
      top: 56%;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      text-align: center;
      z-index: 9998;
      width: min(90vw, 590px);
      padding: 0 16px;
    }

    .eyebrow {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: rgba(255,255,255,0.42);
      margin-bottom: 12px;
    }

    .waiting h2 {
      font-size: 32px;
      margin: 0 0 12px;
      line-height: 1.18;
      font-weight: 700;
    }

    .status-mini {
      font-size: 15px;
      opacity: 0.92;
      margin-top: 15px;
      line-height: 1.4;
      color: rgba(255,255,255,0.94);
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .loader span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #7dffb3;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader span:nth-child(2) { animation-delay: 0.15s; }
    .loader span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% {
        opacity: 0.35;
        transform: scale(0.8);
      }
      40% {
        opacity: 1;
        transform: scale(1.15);
      }
    }

    @keyframes pulseLogo {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>
  <div class="logo-overlay">
    <img src="https://grupondhoteles.com/wp-content/uploads/Logotipo-ND-Hoteles-blanco.webp" alt="ND Hoteles">
  </div>

  <div class="center-logo">
    <img src="https://res.cloudinary.com/df3qb7ens/image/upload/v1775333944/logo_ndhoteles3_chdcaw.webp" alt="ND Hoteles">
  </div>

  <div class="waiting">
    <div class="eyebrow">ND Hoteles · Atención en directo</div>
    <h2>Estamos conectando contigo</h2>
    <div class="status-mini" id="estadoMini">Comprobando estado…</div>

    <div class="loader">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script type="module">
    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    const API_BASE = "https://nd-hoteles-backend.onrender.com";
    const avisoId = getParam("id");
    const estadoMini = document.getElementById("estadoMini");

    let llamadaAbierta = false;
    let dailyWindow = null;
    let yaVolviendo = false;
    let pollingId = null;

    function abrirDailyEnVentana(dailyLink) {
      if (llamadaAbierta) return;

      llamadaAbierta = true;
      estadoMini.textContent = "Conectando con RECEPCIÓN ND HOTELES…";

      try {
        dailyWindow = window.open("", "dailyKioskoWindow");

        if (!dailyWindow) {
          estadoMini.textContent = "El navegador ha bloqueado la videollamada.";
          llamadaAbierta = false;
          return;
        }

        dailyWindow.document.write(`
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ND Hoteles · Conectando…</title>
            <style>
              html, body {
                margin: 0;
                height: 100%;
                background: radial-gradient(circle at top, #191919 0%, #080808 55%, #000000 100%);
                font-family: Arial, sans-serif;
                color: white;
              }

              .wrap {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                text-align: center;
                padding: 24px;
              }

              .logo img {
                width: 180px;
                margin-bottom: 20px;
                max-width: 70vw;
                filter: drop-shadow(0 0 14px rgba(255,255,255,0.12));
              }

              h1 {
                font-size: 30px;
                margin-bottom: 12px;
                line-height: 1.2;
              }

              p {
                opacity: 0.82;
                font-size: 16px;
                line-height: 1.4;
                margin: 0;
              }

              .loader {
                margin-top: 20px;
                display: flex;
                justify-content: center;
                gap: 10px;
              }

              .loader span {
                width: 12px;
                height: 12px;
                background: #7dffb3;
                border-radius: 50%;
                animation: bounce 1.2s infinite;
              }

              .loader span:nth-child(2) { animation-delay: .15s; }
              .loader span:nth-child(3) { animation-delay: .3s; }

              @keyframes bounce {
                0%, 80%, 100% { opacity: .3; transform: scale(.8); }
                40% { opacity: 1; transform: scale(1.2); }
              }
            </style>
          </head>
          <body>
            <div class="wrap">
              <div>
                <div class="logo">
                  <img src="https://grupondhoteles.com/wp-content/uploads/Logotipo-ND-Hoteles-blanco.webp" alt="ND Hoteles">
                </div>
                <h1>Conectando con RECEPCIÓN ND HOTELES</h1>
                <p>En breve serás atendido por nuestro equipo</p>
                <div class="loader">
                  <span></span><span></span><span></span>
                </div>
              </div>
            </div>
          </body>
          </html>
        `);

        dailyWindow.document.close();
const urlDaily = new URL(dailyLink);
urlDaily.searchParams.set("theme", "dark");
urlDaily.searchParams.set("lang", "es");

dailyWindow.location.replace(urlDaily.toString());
       setTimeout(() => {
  try {
    if (dailyWindow && !dailyWindow.closed) {
      const urlDaily = new URL(dailyLink);
      urlDaily.searchParams.set("theme", "dark");
      urlDaily.searchParams.set("lang", "es");
      dailyWindow.location.replace(urlDaily.toString());
    }
  } catch (e) {
    console.error("Error al redirigir a Daily:", e);
  }
}, 150);

        estadoMini.textContent = "Conexión abierta. Esperando atención…";
      } catch (e) {
        console.error("Error al abrir Daily:", e);
        estadoMini.textContent = "Error al abrir Daily.";
        llamadaAbierta = false;
      }
    }

    function volverAlInicio() {
      if (yaVolviendo) return;
      yaVolviendo = true;

      estadoMini.textContent = "Gracias. Volviendo a la pantalla principal…";

      try {
        if (dailyWindow && !dailyWindow.closed) {
          dailyWindow.close();
        }
      } catch (e) {
        console.error("No se pudo cerrar la ventana Daily:", e);
      }

      if (pollingId) {
        clearInterval(pollingId);
      }

      setTimeout(() => {
        window.location.replace("kiosko.html");
      }, 80);
    }

    async function leerAvisoActual() {
      try {
        const response = await fetch(`${API_BASE}/avisos`);
        const avisos = await response.json();

        if (!Array.isArray(avisos)) {
          estadoMini.textContent = "Respuesta inválida del backend.";
          return;
        }

        const data = avisos.find((item) => item.id === avisoId);

        if (!data) {
          estadoMini.textContent = "No se encuentra el aviso.";
          return;
        }

        const estado = (data.estado || "").toString().trim().toLowerCase();
        const retornarKiosko = data.retornarKiosko === true;

        if (!llamadaAbierta && !yaVolviendo) {
          if (estado === "nuevo") {
            estadoMini.textContent = "Aviso enviado correctamente. Esperando disponibilidad…";
          } else if (estado === "en_atencion") {
            estadoMini.textContent = "Recepción está accediendo a tu solicitud…";
          } else if (estado === "listo_para_entrar") {
            estadoMini.textContent = "Conectando con RECEPCIÓN ND HOTELES…";
          } else {
            estadoMini.textContent = "Estado actual: " + (estado || "sin estado");
          }
        }

        if (estado === "listo_para_entrar" && data.dailyLink && !llamadaAbierta) {
          abrirDailyEnVentana(data.dailyLink);
          return;
        }

        if (
          estado === "finalizada" ||
          estado === "retorno_inicio" ||
          estado === "resuelta" ||
          retornarKiosko
        ) {
          volverAlInicio();
          return;
        }
      } catch (error) {
        console.error("Error leyendo aviso desde backend:", error);
        estadoMini.textContent = "Error leyendo estado.";
      }
    }

    if (!avisoId) {
      estadoMini.textContent = "Falta el identificador del aviso.";
    } else {
      leerAvisoActual();
      pollingId = setInterval(leerAvisoActual, 700);
    }

    window.addEventListener("focus", () => {
      if (yaVolviendo) return;
      if (llamadaAbierta) {
        estadoMini.textContent = "Conexión abierta. Esperando fin de atención…";
      }
    });
  </script>
</body>
</html>
